<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق تشخيص الاختناق - مخطط بياني</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- الشريط الجانبي -->
        <aside class="sidebar">
            <div class="reset-section">
                <button id="resetBtn" class="reset-button">🔄 إعادة التعيين</button>
                <div class="progress">
                    <span id="progressCount">0</span> / 5
                </div>
            </div>

            <div class="stats">
                <div class="stat wrong">
                    <span class="icon">❌</span>
                    <span id="wrongCount">0</span>
                </div>
                <div class="stat correct">
                    <span class="icon">✅</span>
                    <span id="correctCount">0</span>
                </div>
            </div>

            <div class="info-box">
                <p>⚠️ اتبع الأسئلة لتحديد الإجراء الصحيح</p>
            </div>

            <div class="keywords-section">
                <h3>📋 الخطوات</h3>
                <div id="keywordsList" class="keywords-list"></div>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header>
                <h1>🏥 تطبيق تشخيص حالات الاختناق</h1>
                <p>إرشادات إسعاف المصابين بالاختناق</p>
            </header>

            <!-- المخطط البياني -->
            <div class="flowchart-wrapper">
                <svg id="flowchartSvg" class="flowchart-svg"></svg>
                <div id="interactiveContainer" class="interactive-area"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
